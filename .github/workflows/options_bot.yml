name: SP500 Options Telegram Bot

on:
  workflow_dispatch:
  schedule:
    # Run two minutes after each 15-minute boundary.
    # The broad UTC window covers both EDT and EST US market hours.
    - cron: "2,17,32,47 13-21 * * 1-5"
    - cron: "2 22 * * 1-5"

permissions:
  contents: read

# Never allow two scans to modify the position state simultaneously.
concurrency:
  group: volume-first-swing-alerts
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      # GitHub-hosted runners are temporary. Restoring this file is required
      # for ENTRY, PT1, PT2, stop, cancellation, and early-close alerts to
      # continue across separate scheduled runs.
      - name: Restore signal state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/swing_signal_state.json
            data/sp500_sectors.csv
            data/ticker_sector_cache.json
          key: swing-signal-state-${{ github.run_id }}
          restore-keys: |
            swing-signal-state-

      - name: Run swing scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
        run: python bot.py

      # A unique key creates a new snapshot. The next scheduled run restores
      # the newest snapshot through restore-keys.
      - name: Save signal state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/swing_signal_state.json
            data/sp500_sectors.csv
            data/ticker_sector_cache.json
          key: swing-signal-state-${{ github.run_id }}